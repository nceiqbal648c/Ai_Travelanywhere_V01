<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai_Travel_Anywhere</title>
    <style>
        body {
            background-color: #1a1e29;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 450px;
            margin: 30px auto;
            padding: 25px;
            background: #242936;
            border-radius: 12px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00d2ff;
            box-shadow: 0 0 15px #00d2ff;
            object-fit: cover;
            margin-bottom: 10px;
        }
        h1 {
            color: #00d2ff;
            font-size: 24px;
            margin: 5px 0;
        }
        .subtitle {
            color: #b388ff;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
        }
        .label {
            text-align: left;
            color: #8fa0b5;
            font-size: 12px;
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            background: #161a23;
            border: 2px solid #2e384d;
            border-radius: 6px;
            color: #fff;
            outline: none;
        }
        input:focus {
            border-color: #00d2ff;
        }
        .btn-paste {
            background: transparent;
            border: 2px solid #00d2ff;
            color: #00d2ff;
            border-radius: 6px;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .main-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid #00d2ff;
            color: #00d2ff;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .sub-btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        .sub-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 2px solid #7a42f4;
            color: #b388ff;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }
        .status {
            color: #ff5252;
            font-size: 13px;
            margin-top: 15px;
        }
        .footer {
            margin-top: 35px;
            display: flex;
            justify-content: space-between;
            color: #56667a;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="container">
    <img class="avatar" src="/static/images/1000053178.png" onerror="this.src='https://via.placeholder.com/100'" alt="Logo">
    
    <h1>AI Travel Anywhere</h1>
    <div class="subtitle">Builder Mode Activated</div>

    <span class="label">Paste Video Link</span>
    <div class="input-group">
        <input type="text" id="linkInput" placeholder="https://youtube.com/shorts/...">
        <button class="btn-paste" onclick="pasteFromClipboard()">PASTE</button>
    </div>

    <button class="main-btn" onclick="startDownload('video')">🚀 DOWNLOAD COMMAND</button>

    <div class="sub-btn-group">
        <button class="sub-btn" onclick="startDownload('video')">🎬 DOWNLOAD MP-4</button>
        <button class="sub-btn" onclick="startDownload('audio')">🎵 DOWNLOAD AUDIO</button>
    </div>

    <div id="statusArea" class="status"></div>

    <div class="footer">
        <div>Creator by: <b>Iqbal Ahmed</b></div>
        <div>v: <b>Ai_Travelanywhere 00.7</b></div>
    </div>
</div>

<script>
    function pasteFromClipboard() {
        navigator.clipboard.readText().then(text => {
            document.getElementById("linkInput").value = text;
        }).catch(() => {
            alert("Clipboard permission denied!");
        });
    }

    async function startDownload(type) {
        const urlInput = document.getElementById("linkInput").value.trim();
        if (!urlInput) {
            alert("Please paste a link first!");
            return;
        }

        const statusArea = document.getElementById("statusArea");
        statusArea.style.color = "#00d2ff";
        statusArea.innerText = type === 'video' ? "Video Downloading... 🚀" : "Audio Downloading... 🎵";

        try {
            const response = await fetch("/download", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: urlInput, type: type })
            });

            if (response.ok) {
                statusArea.innerText = "Processing file download...";
                const blob = await response.blob();
                const dlUrl = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = dlUrl;
                a.download = ""; 
                document.body.appendChild(a);
                a.click();
                a.remove();
                statusArea.innerText = "Download Successful! 🎉";
                statusArea.style.color = "#4caf50";
            } else {
                const errData = await response.json();
                statusArea.innerText = errData.message || "Download Failed!";
                statusArea.style.color = "#ff5252";
            }
        } catch (error) {
            statusArea.innerText = "Network Error! Server didn't respond.";
            statusArea.style.color = "#ff5252";
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Anywhere</title>
    <style>
        body { 
            background: #040814; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .hero-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .logo { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            margin-bottom: 15px; 
            border: 2px solid #00fefe; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 15px 0; 
            border-radius: 8px; 
            border: none; 
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #00fefe; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #040814;
        }
    </style>
</head>
<body>
    <div class="hero-card">
        <img src="icon.png" class="logo" alt="Logo">
        <h2>AI Travel Anywhere</h2>
        <input type="text" placeholder="Paste Video Link...">
        <button>PASTE</button>
    </div>
</body>
</html>

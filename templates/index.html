<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai_Travelanywhere 00.7 - UI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        body {
            background: linear-gradient(rgba(10, 15, 30, 0.85), rgba(10, 15, 30, 0.95)), 
                        url('1000053178.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .nano-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 242, 254, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .nano-input {
            background: rgba(5, 10, 20, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: #00f2fe;
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.5);
            transition: all 0.3s ease;
        }
        .nano-input:focus {
            outline: none;
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        .btn-cyan {
            background: transparent;
            border: 1px solid #00f2fe;
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
            transition: all 0.2s ease;
        }
        .btn-cyan:active, .btn-cyan:focus {
            background: #00f2fe;
            color: #050a14;
            box-shadow: 0 0 25px #00f2fe, inset 0 0 10px rgba(255,255,255,0.5);
        }
        .btn-purple {
            background: transparent;
            border: 1px solid #9d4edf;
            color: #9d4edf;
            text-shadow: 0 0 8px rgba(157, 78, 223, 0.6);
            box-shadow: inset 0 0 10px rgba(157, 78, 223, 0.2);
            transition: all 0.2s ease;
        }
        .btn-purple:active, .btn-purple:focus {
            background: #9d4edf;
            color: #050a14;
            box-shadow: 0 0 25px #9d4edf, inset 0 0 10px rgba(255,255,255,0.5);
        }
        .nano-circle {
            border: 4px solid rgba(0, 242, 254, 0.1);
            border-top: 4px solid #00f2fe;
            border-bottom: 4px solid #9d4edf;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1.5s linear infinite;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white bg-cover bg-center bg-fixed" style="background:linear-gradient(rgba(5,15,35,0.55),rgba(5,15,35,0.55)),url('/static/iqbal_v01.jpg') center center/cover no-repeat;">
    <div class="nano-panel w-full max-w-lg rounded-2xl p-8 flex flex-col items-center space-y-6 relative overflow-hidden">
        <div class="text-center">
            <div class="w-20 h-20 mx-auto rounded-full border border-cyan-400 p-1 bg-black/40 shadow-[0_0_15px_rgba(0,242,254,0.3)] mb-3">
                <img src="b3237465-1bb3-4efd-af2a-86fcc5023d17-1_all_39745.png" alt="Logo" class="w-full h-full rounded-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=150';">
            </div>
            <h1 class="text-2xl font-bold tracking-widest text-cyan-400 shadow-sm" style="text-shadow: 0 0 10px rgba(0,242,254,0.6);">AI Travel Anywhere</h1>
            <p class="text-xs text-purple-400 mt-1 uppercase tracking-wider">Builder Mode Activated</p>
        </div>
        <div class="w-full space-y-2">
            <label class="text-xs text-gray-400 uppercase tracking-widest block ml-1">Paste Video Link</label>
            <div class="flex gap-2">
                <input type="text" id="videoUrl" placeholder="https://youtube.com/watch?v=..." class="nano-input w-full px-4 py-3 rounded-xl text-sm font-mono">
                <button onclick="pasteLink()" class="btn-cyan px-4 py-2 rounded-xl text-xs uppercase font-bold cursor-pointer">Paste</button>
                <button onclick="pasteLink()" class="btn-purple px-3 py-2 rounded-xl text-xs cursor-pointer">📘 Facebook</button>
                <button onclick="pasteLink()" class="btn-purple px-3 py-2 rounded-xl text-xs cursor-pointer">🎵 TikTok</button>
            </div>
        </div>
        <div class="w-full grid grid-cols-1 gap-3 pt-2">
            <button onclick="startDownload('video')" id="downloadBtn" class="btn-cyan w-full py-3 rounded-xl font-bold uppercase tracking-wider text-sm cursor-pointer">
                🚀 Download Command
            </button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="startDownload('video')" class="btn-purple py-3 rounded-xl font-semibold uppercase tracking-wider text-xs cursor-pointer">
                    🎬 Download MP-4
                </button>
                <button onclick="startDownload('audio')" class="btn-purple py-3 rounded-xl font-semibold uppercase tracking-wider text-xs cursor-pointer">
                    🎵 Download Audio
                </button>
            </div>
        </div>
        <div id="statusSection" class="flex flex-col items-center justify-center space-y-3 pt-4 hidden w-full">
            <div id="statusCircle" class="nano-circle"></div>
            <p id="statusText" class="text-xs text-cyan-400 animate-pulse font-mono tracking-wide">Processing Nano-Stream...</p>
        </div>
        <div class="w-full border-t border-gray-800 pt-4 flex justify-between items-center text-[10px] text-gray-500 font-mono">
            <div>Creator by: <span class="text-gray-300">Iqbal Ahmed</span></div>
            <div>v: Ai_Travelanywhere 00.7</div>
        </div>
    </div>
<script>
    async function pasteLink() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('videoUrl').value = text;
        } catch (err) {
            alert('ক্লিপবোর্ড থেকে রিড করার পারমিশন দিন বা ম্যানুয়ালি পেস্ট করুন।');
        }
    }
    async function startDownload(type) {
        const urlInput = document.getElementById('videoUrl').value.trim();
        const mainBtn = document.getElementById('downloadBtn');
        const statusSection = document.getElementById('statusSection');
        const statusText = document.getElementById('statusText');
        const statusCircle = document.getElementById('statusCircle');
        if(!urlInput) {
            statusSection.classList.remove('hidden');
            statusCircle.style.animation = 'none';
            statusCircle.style.borderColor = '#f87171';
            statusText.className = "text-xs text-red-400 font-mono";
            statusText.innerText = "Error: Please paste a valid link!";
            return;
        }
        mainBtn.disabled = true;
        statusSection.classList.remove('hidden');
        statusCircle.style.animation = 'spin 1.5s linear infinite';
        statusCircle.style.borderColor = 'rgba(0, 242, 254, 0.1)';
        statusCircle.style.borderTopColor = '#00f2fe';
        statusText.className = "text-xs text-cyan-400 animate-pulse font-mono";
        statusText.innerText = type === 'audio' ? "Extracting Audio Nano-Stream..." : "Processing Video Nano-Stream...";
        try {
            const response = await fetch('/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput, type: type })
            });
            if (response.ok) {
    statusCircle.style.animation = 'none';
    statusCircle.style.borderColor = '#34d399';
    statusText.className = "text-xs text-green-400 font-mono text-center";
    statusText.innerHTML = `Success! ${type === 'audio' ? 'Audio' : 'Video'} Downloaded.`;
} else {
    statusCircle.style.animation = 'none';
    statusCircle.style.borderColor = '#f87171';
    statusText.className = "text-xs text-red-400 font-mono";
    statusText.innerText = "Download Failed!";
            }
        } catch (error) {
            statusCircle.style.animation = 'none';
            statusCircle.style.borderColor = '#f87171';
            statusText.className = "text-xs text-red-400 font-mono";
            statusText.innerText = "Network Error! Server didn't respond.";
        } finally {
            mainBtn.disabled = false;
        }
    }
</script>
</body>
</html>

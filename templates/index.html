<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <h1>ΔI_TRAVEL_ΔNYWHERE</h1>
        <div class="input-group">
            <input type="text" id="video-url" placeholder="Paste your link here..">
            <button onclick="pasteUrl()">PASTE</button>
        </div>
        <div class="platform-btns">
            <button onclick="setPlatform('youtube')">YOUTUBE</button>
            <button onclick="setPlatform('facebook')">FACEBOOK</button>
            <button onclick="setPlatform('tiktok')">TIKTOK</button>
        </div>
        <button class="start-btn" onclick="startDownload()">START DOWNLOAD</button>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

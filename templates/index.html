<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI_TRAVEL_ANYWHERE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a14; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: #0c111c; border: 2px solid #1a2436; border-radius: 25px; padding: 25px; box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); text-align: center; }
        h1 { color: #00f2ff; font-size: 22px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .input-group { background: #161b22; border: 1px solid #30363d; padding: 12px; border-radius: 15px; display: flex; gap: 10px; margin-bottom: 20px; }
        input { background: none; border: none; color: white; width: 100%; outline: none; }
        .btn-paste { background: #ff9500; border: none; padding: 8px 15px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .social-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .social-btn { font-size: 30px; color: #fff; text-decoration: none; transition: 0.3s; }
        .fa-youtube { color: #ff0000; }
        .fa-facebook { color: #1877f2; }
        .fa-tiktok { color: #ffffff; } /* টিকটক লোগো সাদা রেখেছি যেন ডার্ক থিমে ভালো লাগে */
        .social-btn:hover { transform: scale(1.2); }
        .creator-tag { color: #00f2ff; font-size: 14px; margin-top: 30px; font-weight: bold; border-top: 1px solid #1a2436; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI_TRAVEL_ANYWHERE</h1>
        <div class="input-group">
            <input type="text" placeholder="Paste your link here...">
            <button class="btn-paste">PASTE</button>
        </div>
        
        <div class="social-buttons">
            <a href="#" class="social-btn"><i class="fab fa-youtube"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-facebook"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-tiktok"></i></a>
        </div>

        <div class="creator-tag">
            Ai Creator : Iqbal Ahmed
        </div>
    </div>
</body>
</html>

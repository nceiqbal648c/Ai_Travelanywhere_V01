<!DOCTYPE html>
<html>
<head>
    <title>Ai_Travel_Anywhere</title>
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('{{ url_for('static', filename='background.jpg') }}'); 
            background-size: cover; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            font-family: sans-serif; 
        }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { width: 120px; border-radius: 50%; border: 2px solid cyan; }
        .btn { 
            padding: 15px 40px; 
            margin: 10px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold;
        }
        .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }
        .footer { position: fixed; bottom: 20px; width: 100%; text-align: center; }
        .footer img { width: 150px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="header">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">
        <h1>Ai_Travel_Anywhere</h1>
    </div>

    <form action="/download" method="POST">
        <button class="btn" type="submit">DOWNLOAD MEDIA</button>
    </form>

    <div class="footer">
        <img src="{{ url_for('static', filename='1000063818.png') }}" alt="Signature">
    </div>
</body>
</html>

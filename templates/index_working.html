<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Anywhere</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="background-overlay"></div>

<div class="main-container">

    <div class="logo-section">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <h1>AI Travel Anywhere</h1>
        <p>Fast • Secure • Premium Downloader</p>
    </div>

    <div class="glass-card">

        <input
            id="video-url"
            type="text"
            placeholder="Paste YouTube / Facebook / Instagram Link">

        <button id="paste-btn">
            📋 Paste Link
        </button>

        <button class="download-btn mp4">
            🎥 Download MP4
        </button>

        <button class="download-btn mp3">
            🎵 Download MP3
        </button>

    </div>

    <div class="preview-card">

        <img id="thumbnail"
             src=""
             style="display:none;">

        <h2 id="video-title">
            Video title will appear here
        </h2>

        <p id="channel-name">
            Channel Name
        </p>

    </div>

    <div class="progress-section">

        <div class="progress-bar">

            <div id="progress"></div>

        </div>

        <span id="percent">
            0%
        </span>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>

name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libffi-dev libssl-dev libsqlite3-dev libbz2-dev
        pip3 install --upgrade pip
        pip3 install cython buildozer gitpython

    - name: Build Android APK
      run: |
        export FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true
        buildozer -v android debug

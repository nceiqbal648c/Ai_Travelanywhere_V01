name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk zip unzip libncurses6 libstdc++6 build-essential ccache git libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Pure Python Buildozer Spec Fixer
        run: |
          python -c "
          import os
          filename = 'buildozer.spec'
          if os.path.exists(filename):
              with open(filename, 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              # ফাইলের প্রথম লাইনে [app] জোরপূর্বক বসিয়ে দেওয়া হচ্ছে
              lines[0] = '[app]\n'
              with open(filename, 'w', encoding='utf-8') as f:
                  f.writelines(lines)
              print('buildozer.spec successfully fixed with python!')
          else:
              print('buildozer.spec not found, letting buildozer init it.')
          "

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI_Travel_Anywhere_APK
          path: bin/*.apk
